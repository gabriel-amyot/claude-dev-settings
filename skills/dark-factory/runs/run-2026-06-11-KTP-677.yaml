improvements:
  - title: "Capture skip_reason in every HALT_AGENT_SKIPPED return"
    detail: >
      All eleven null-guards in dark-factory.workflow.js return { status: 'HALT_AGENT_SKIPPED',
      phase, ticket } with no cause. Extend agent() (or the guard sites) to surface WHY the return
      was null — user_declined | dispatch_error | timeout | schema_validation_failed | unknown —
      and include it in the halt object and the trace. Retro and the auto-improvement loop are
      blind without it; this run's root cause is unrecoverable.
  - title: "Retry idempotent read-only phases once before halting"
    detail: >
      Concierge (and Grill) are read-only and idempotent. On a null agent() return at those phases,
      retry exactly once (with the same prompt, label suffixed '-retry') before emitting
      HALT_AGENT_SKIPPED. Bound it to one retry to respect the pipeline-retry circuit-breaker
      principle. This converts transient dispatch failures into normal runs at near-zero risk.
  - title: "Resolve ticket_folder mechanically in workflow.js, before the concierge"
    detail: >
      Add a cheap deterministic resolver at run start: glob
      project-management/tickets/*/**/<TICKET> (and archive/ as fallback) and carry the result in
      the run context. The concierge can still confirm/override, but pre-concierge halts then have
      a real folder for artifacts and for the retro contract's own fallback path
      (ticket reports/). KTP-677 resolves unambiguously to tickets/KTP/KTP-558/KTP-677.
  - title: "Emit a stub trace entry for every attempted phase, including skips"
    detail: >
      rec() only runs after a successful agent return, so a phase-1 skip yields trace []. Record an
      'attempted' stub (phase, timestamp, outcome: skipped + skip_reason) at dispatch time and
      finalize it on return. Guarantees retro never receives an empty trace for a run that
      consumed a dispatch.
  - title: "Re-dispatch KTP-677 promptly and sequence it before KTP-678"
    detail: >
      Nothing was consumed by this run and the ticket is the readiest in Sprint 6 (Leo gate 92/100,
      deletion targets verified on origin/dev 2026-06-10, AC-0 BQ premise verified live, AC-2
      frontend grep already answered: zero hits → delete). Re-run /dark-factory KTP-677 first
      thing; pass the spec-gate report (tickets/KTP/KTP-558/KTP-677/reports/reviews/
      sprint6-spec-gate-2026-06-10.md) as warm-start context, and land it before KTP-678 to avoid
      the ProximityTableConfig collision.

