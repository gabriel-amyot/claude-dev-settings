      the contract said it would be, and a future automated TDD-gate check keyed on tdd/AC-*.md would
      find nothing.
  - points: 4
    reason: >
      factory_fitness: misleading artifact name. qa/full-suite-java21.out actually contains the JDK17
      BUILD SUCCESS run (485 tests green), while qa/full-suite.out contains the JDK21 FAILURE run. The
      filenames are inverted relative to their contents, which would mislead any reader (human or agent)
      auditing the proof set and could be mistaken for "the JDK21 run passed."
  - points: 3
    reason: >
      factory_fitness: the JDK17 hard requirement was honored only after a JDK21 false-failure was first
      produced (full-suite.out errors). The design and grill both flagged JDK17 as a hard gate up front,
      yet the build station still ran at least one suite under the box-default JDK21 before switching.
      The belt's build/test sockets should pin JAVA_HOME to temurin-17 mechanically so the wasted JDK21
      run never happens.

