improvements:
  - title: "Implement the review-findings gate this time (second strike — highest priority)"
    detail: >
      The KTP-678 retro already specified it: contract 5 must write review/findings.yaml (severity
      counts, each finding file:line + disposition, explicit 'criticals: 0' record of what was
      inspected) and workflow.js must refuse a review PASS when the file is absent — exactly as the
      TDD gate refuses unproven RED. KTP-763 shipped with an empty review/ dir behind 'criticals:0'.
      An improvement flagged twice and implemented zero times means the retro loop itself is
      open-circuit; land this as a workflow.js gate, not a prompt suggestion.
  - title: "QA gate: require qa/result.yaml with test_ref + execution evidence on disk"
    detail: >
      Contract 6's ALL_PASS must be backed by a persisted qa/result.yaml in the ticket folder:
      suite pass/fail counts, per-AC verdicts, RED re-verification refs, and for runnable belts the
      execute-verify proof (boot command + curl + captured response, or an explicit
      execution_waiver with reason). The workflow gate should reject ALL_PASS when the artifact is
      missing. Evidence that only exists in the model's context dies with the context.
  - title: "Java belt: codify the two-CacheManager trap and the Optional cache guard"
    detail: >
      Add to the java tool-belt prompt: (1) app-proximity-report has TWO CacheManager beans —
      @Primary 'mapCacheManager' (MapCacheConfig, owns the DOOH cache family, 1h TTL) and
      non-primary 'cacheManager' (ProximityReportConfig, 30m TTL, opt-in only). New @Cacheable
      names MUST be registered in the manager that will actually resolve them (the @Primary one,
      unless cacheManager= is set); both are static-name-list Caffeine managers, so a miss is a
      runtime IllegalArgumentException invisible to proxy-less unit tests. (2) @Cacheable on
      Optional returns requires unless = "#result == null" per the GoldfishApiHttpClient precedent,
      or upstream blips pin empties for the full TTL. Both bit KTP-763 at design and were only
      saved by the grill.
  - title: "Grill parked items must become machine-readable carry-forwards that ship-prep acknowledges"
    detail: >
      G1/G2 amendments flowed into implement, but parked items P2 (deployed-dev IAM read
      unverified) and P3 (re-check dev pom version at ship) lived only as prose in
      design/grill-report.md. Emit design/parked-items.yaml with {id, kind, blocking_stage,
      required_action}; ship-prep's gate must require each item's status (verified / waived-with-
      reason / escalated-to-inbox) before pass. P2-class items (post-merge environment risk) should
      auto-generate the post-merge validation step or a general/inboxes/ entry.
  - title: "Ship-prep must sync ticket-folder state (STATUS_SNAPSHOT.yaml)"
    detail: >
      Add to contract 7: update STATUS_SNAPSHOT.yaml (status, branch, tip, version, timestamp) as
      part of ship-prep. KTP-763 sits at READY_TO_SHIP while its snapshot says 'TO DO' from
      2026-06-08; every sprint/status tool reading snapshots inherits the lie.
  - title: "Fix session resolution for retro handoffs (third strike)"
    detail: >
      sessions/active/state.yaml session_id has been empty across the 2026-06-11 wave and again
      today; every dark-factory handoff lands in the shared sessions/active/prompts/ root. Either
      the session:init hook must reliably populate session_id (state.yaml's current_focus already
      embeds one — parse it), or contract 9 should fall back to the newest sessions/active/<slug>/
      containing a state file. Pick one and implement; stop re-flagging.
  - title: "Concierge should sync (or fast-forward) the local checkout instead of running the whole line 4 commits behind"
    detail: >
      Fetch-before-read discipline held (all facts read from origin/dev), but every phase paid the
      git show/git grep origin-indirection tax. When the main checkout is behind and clean, the
      concierge should fast-forward it (or record why not) so worktrees and reads start current.

