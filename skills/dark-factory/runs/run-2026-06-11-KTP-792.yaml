improvements:
  - title: "CIRCUIT BREAKER: stop dispatching dark-factory until the Concierge null-return is diagnosed"
    detail: >
      Same failure, same phase, three runs, one day. Per the pipeline-retry circuit-breaker
      principle, the fourth dispatch without a diagnosis is waste. Before any new run: inspect
      the agent() dispatch path in dark-factory.workflow.js (null-guard at the Concierge site),
      reproduce a dispatch in isolation, and determine whether the null is a harness regression
      (e.g. agent registry/schema change), a permission prompt being declined, or a timeout.
      Fix or instrument, then resume.
  - title: "Capture skip_reason in every HALT_AGENT_SKIPPED return"
    detail: >
      Extend agent() (or each null-guard site) to surface WHY the return was null —
      user_declined | dispatch_error | timeout | schema_validation_failed | unknown — and
      include it in the halt object and the trace. Carried from the KTP-677 and KTP-695
      retros; now blocking diagnosis for the third time.
  - title: "Retry idempotent read-only phases once before halting"
    detail: >
      Concierge (and Grill) are read-only and idempotent. On a null agent() return, retry
      exactly once (label suffixed '-retry') before emitting HALT_AGENT_SKIPPED. Bounded to
      one retry to respect the circuit breaker. Carried from sibling retros.
  - title: "Resolve ticket_folder mechanically in workflow.js, before the concierge"
    detail: >
      Glob project-management/tickets/*/**/<TICKET> (archive/ as fallback) at run start and
      carry the result in run context. KTP-792 resolves unambiguously to
      tickets/KTP/KTP-748/KTP-792. Carried from sibling retros.
  - title: "Emit a stub trace entry for every attempted phase, including skips"
    detail: >
      Record an 'attempted' stub (phase, timestamp) at dispatch time and finalize on return
      (outcome: skipped + skip_reason on null). Guarantees retro never receives [] for a run
      that consumed a dispatch. Carried from sibling retros.
  - title: "Make retro improvements gate the next dispatch (close the loop)"
    detail: >
      Add a lightweight pre-dispatch check to the dark-factory front gate: read the last N
      run records from runs/INDEX.md; if the most recent run(s) ended HALT_* with open harness
      improvements for the same phase, surface them to the human concierge gate before
      dispatching. Today the loop wrote the same prescriptions twice and dispatched a third
      run blind.
  - title: "Do NOT re-dispatch KTP-792 until KTP-791 merges; execute the spec-gate pre-actions instead"
    detail: >
      The filter operates on locationTypeName, which exists only after KTP-791's backend MR
      merges (KTP-791 is TO DO with an open unreviewed MR). Sequence: (1) review+merge KTP-791,
      (2) post the drafted recommendation-led reply to Amal via /post-comment (Goldfish
      GET /v2/location-types, ~99 venue types, actual names, no grouping), (3) re-link KTP-791
      as 'blocks' KTP-792, (4) add the three description sentences (list source = distinct
      loaded locationTypeName values matching KTP-791 labels; AC-3 empty-state surface + copy;
      AC-5 selection persistence on layer re-toggle). Then /dark-factory KTP-792 with the
      spec-gate report (tickets/KTP/KTP-748/KTP-792/reports/reviews/sprint6-spec-gate-2026-06-10.md)
      as warm-start context.

