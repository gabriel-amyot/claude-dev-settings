improvements:
  - title: "Add an out-of-scope-change detector to Review (catch phantom deletions/edits before the MR)"
    detail: >
      This run's clean review missed a 542-line teammate-doc DELETION sitting in the diff vs origin/dev
      — a real, mergeable hazard. Add a Review (contract 5) leg that runs `git diff --stat origin/dev..HEAD`
      and flags any file that is (a) deleted or (b) modified but NOT touched by any commit on this branch
      (`git log origin/dev..HEAD -- <file>` empty) and NOT named in the ticket's AC scope. Deletions of
      files the branch never authored are almost always stale-base artifacts and must block PASS until
      reconciled. Highest-priority improvement: a clean review let a silent teammate-work revert through.
  - title: "Resume-pass preflight: fetch + verify the branch is not behind origin/dev before doing work"
    detail: >
      The phantom deletion's root cause is a worktree cut before the docs-location-onboarding merge and
      never re-synced. Before any RESUMED dark-factory pass on an existing branch, run `git fetch origin`
      then `git rev-list --count HEAD..origin/dev`; if > 0, merge origin/dev into the branch (or surface a
      block) BEFORE implementing. This is the user's fetch-before-read gate applied to factory resumes.
  - title: "Enforce the Review findings artifact as a hard gate (now overdue THREE runs)"
    detail: >
      Three consecutive KTP-784 runs reported criticals:0 with an EMPTY review/ folder. The needs-visual
      retro already proposed promoting this to a workflow.js gate and it did not stick. Make contract 5
      physically unable to return PASS unless a findings file exists at <ticket>/review/ (scope reviewed,
      out-of-scope-change scan result, criticals/majors/minors counts, one-line rationale). A
      recommendation that survives two retros unactioned must become code.
  - title: "Make the AC-2 deploy half an explicit terminal close-out item (regen + manual Mapbox upload)"
    detail: >
      AC-2 split cleanly into a script change (done, tested, pushed) and a deploy step (regen .mbtiles +
