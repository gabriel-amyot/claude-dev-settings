improvements:
  - title: "Circuit-break the batch after the first HALT_AGENT_SKIPPED"
    detail: >
      KTP-677, KTP-695, and KTP-784 all died at the identical pre-concierge null within the same
      day's dispatch. When a run terminates HALT_AGENT_SKIPPED at the FIRST phase, the dispatcher
      (sprint-factory or the human loop) should stop dispatching further tickets and diagnose the
      harness instead — same principle as the pipeline-retry circuit breaker. Three dead cycles on
      day 1 of Sprint 6 were two more than needed to learn the lesson.
  - title: "Capture skip_reason in every HALT_AGENT_SKIPPED return"
    detail: >
      All null-guards in dark-factory.workflow.js return { status: 'HALT_AGENT_SKIPPED', phase,
      ticket } with no cause. Extend agent() (or the guard sites) to surface WHY the return was
      null — user_declined | dispatch_error | timeout | schema_validation_failed | unknown — and
      include it in the halt object and the trace. Filed on KTP-677 this morning; still the top
      diagnostic gap.
  - title: "Retry idempotent read-only phases once before halting"
    detail: >
      On a null agent() return at Concierge (or Grill), retry exactly once (same prompt, label
      suffixed '-retry') before emitting HALT_AGENT_SKIPPED. Bounded to one retry per the
      circuit-breaker principle. Would likely have saved both of today's dead runs.
  - title: "Resolve ticket_folder mechanically in workflow.js, before the concierge"
    detail: >
      Glob project-management/tickets/*/**/<TICKET> (archive/ as fallback) at run start and carry
      the result in the run context. Pre-concierge halts then have a real folder for artifacts and
      for the retro contract's own fallback path. KTP-784 resolves unambiguously to
      tickets/KTP/KTP-558/KTP-784.
  - title: "Emit a stub trace entry for every attempted phase, including skips"
    detail: >
      rec() only runs after a successful agent return, so a phase-1 skip yields trace []. Record an
      'attempted' stub (phase, timestamp, outcome: skipped + skip_reason) at dispatch time and
      finalize it on return. Retro should never receive an empty trace for a run that consumed a
      dispatch.
  - title: "Re-dispatch KTP-784 with the spec-gate report as mandatory warm-start context"
    detail: >
      Before re-running /dark-factory KTP-784: (1) post the AC-0 confirmation comment Leo drafted
      (via /post-comment) — Q1 drop ALAND/AWATER, Q2 exclusions confirmed, AC-1 amendment
      (boundaries done by KTP-683 3e4cd1d; remaining work = centers source promoteId +
      prepare_tilesets.sh id-flag alignment); (2) pass
      tickets/KTP/KTP-558/KTP-784/reports/reviews/sprint6-spec-gate-2026-06-10.md to the concierge
      so it does not re-verify a half-superseded AC-1 or miss the STATEFP regen-script
      contradiction. The ticket is otherwise in good shape (91/100) and 1 SP.

