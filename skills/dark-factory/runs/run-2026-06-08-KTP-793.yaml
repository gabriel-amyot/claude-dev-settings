improvements:
  - title: "Land the visual-AC feasibility pre-flight gate (proposed at KTP-788, still open)"
    detail: >
      workflow.js should detect rendered-UI ACs (the frontend belt already classifies them) and, before
      spending implement+review+qa, check whether visual verification is achievable this run: is a
      drivable authenticated browser available (or is dev up — not in nightly shutdown) AND does a
      renderable fixture exist for the AC's data condition? If not, surface a single up-front decision
      ('visual ACs will land at PARTIAL — proceed code-only, run local-render, or defer?') instead of
      discovering it at QA. This is the #1 recurring fitness gap across KTP-728/758/759/788/793. It was
      proposed in the KTP-788 retro and has not been implemented; KTP-793 is direct evidence the gap
      persists. Prioritize landing it.
  - title: "Add a localhost-render QA fallback for IAP-independent interaction ACs"
    detail: >
      KTP-793's ACs (pin click suppresses Demographics, enlarged hit radius, ZIP demographics still
      opens on a miss, degraded-state panel copy) are renderable against a seeded local stack with no
      IAP. When ui-probe cannot reach dev (nightly shutdown) or lacks an authenticated Chrome, the QA
      belt should route to /klever-local-stack + um-local-seed + a DOOH-pin fixture and drive the
      /measurement route on localhost to capture a real PASS screenshot, rather than capping at PARTIAL.
      Reserve PARTIAL for ACs that genuinely require auth-gated or vendor-coverage-gated data (e.g.
      KTP-788's Canadian FSA fixture), not for interactions that render locally.
  - title: "Separate pre-existing typecheck noise from run signal in the QA gate"
    detail: >
      QA already knows dev carries pre-existing tsc errors in __tests__ files (vitest not installed).
      The gate should diff the changed-file set against the error set and emit two counts
      (run-introduced: 0, pre-existing: 4) so a reader never manually attributes. Fail only on
      run-introduced errors. Repeat of the KTP-788 finding — worth implementing rather than re-flagging.
  - title: "Auto-capture undemonstrated MEDIUM/LOW review findings as deferred hardening"
    detail: >
      The cluster-over-ZIP non-arbitration (doohPinUnderClick queries only DOOH_UNCLUSTERED_LAYER, not
      DOOH_CLUSTER_LAYER) is out-of-AC-scope-for-now but a real interaction path. When review records a
      demonstrated:false MEDIUM/LOW finding, retro (or the ship loop) should append it to a 'deferred
      hardening' list in the ticket reports so it is not silently lost — cheaper than re-discovering as
      a prod bug if cluster bubbles ever overlay reachable ZIP boundaries. Repeat of the KTP-788
      finding.
  - title: "Track the recurring HALT_PRESHIP root cause as a meta-item, not a per-run red flag"
    detail: >
      Five consecutive UI-AC tickets (728/758/759/788/793) halted pre-ship on the identical root cause.
      Re-listing it as a fresh red flag each run dilutes signal. Promote it to a single tracked
      factory-improvement item (the visual-AC feasibility gate + local-render fallback above) and have
      retro reference that item rather than re-deriving it, so the improvement actually lands instead of
      being perpetually re-proposed.

