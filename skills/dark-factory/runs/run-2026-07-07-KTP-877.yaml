improvements:
  - title: "Retry once on a null agent return before emitting HALT_AGENT_SKIPPED (recurring — top priority)"
    detail: >
      A null agent result is far more likely a dispatch glitch or accidental skip than a considered
      decision, and here it cost a run that had already completed three phases. Automatically re-dispatch
      the same socket once (with the skip flagged) before halting. This is the SAME improvement proposed
      in the 2026-06-11 KTP-739 retro and never landed; the identical failure at Implement this run is
      the cost of that gap. Highest value at the Implement socket, where a full design/grill context is
      already invested.
  - title: "Add a resume-from-Implement path for a HALT_AGENT_SKIPPED at a post-planning phase"
    detail: >
      This run halted after grill with a complete plan (design/impl-plan.md, design/grill-report.md,
      tdd/AC-4.md, draft ADR). Re-running concierge/design/grill on resume is wasteful. A
      HALT_AGENT_SKIPPED at Implement should be directly re-dispatchable to the Implement socket,
      consuming the existing artifacts. Cheapest concrete next action for KTP-877: re-dispatch Implement
      only, branching each cfg repo from origin/main per grill note N1.
  - title: "Carry a skip-reason + partial trace through the HALT_AGENT_SKIPPED return"
    detail: >
      Extend the workflow.js null-guard return to classify WHY the agent came back null (operator skip
      vs dispatch failure vs timeout vs infra-blocked), a timestamp, and any partial trace. Contract 9
      currently reconstructs the skip cause by hand from on-disk artifacts. Recurring ask across retros."
  - title: "Implement must work in a committed worktree/branch and WIP-commit before returning; ban ephemeral /tmp"
    detail: >
      tdd/AC-4.md shows fmt ran in /tmp/ktp877-cfg-app — an ephemeral checkout whose work vanished with
      the null return. Require the Implement socket to create the branch (from origin/main) in a real
      worktree and WIP-commit before any return, so a null/halt never vaporizes a produced diff. The
      TDD ledger should cite a real commit sha, not a forward-reference.
  - title: "Forbid forward-references to non-existent artifacts in the TDD ledger"
    detail: >
      The AC-4 ledger cited 'GREEN sha in review/diff artifacts' that never existed. The ledger's GREEN
      section must reference the actual commit sha / diff path present at write time, or mark it PENDING
      / NOT-YET-PRODUCED. An artifact must never assert a GREEN the run has not produced."
  - title: "Mark vacuous TDD-gate PASS in telemetry and the runs INDEX when no code phase ran"
    detail: >
      When the run halts before any RED->GREEN code sequence, tag the TDD gate result 'vacuous' in the
      YAML and INDEX so a halt-before-code run is not misread as a clean quality signal. Applies to every
      HALT before Implement, not just this ticket."

summary: >
  Near-miss run: concierge/design/grill all passed with strong confidence (80/86/82) and produced a
  fully specced, ready-to-implement cfg PR plan (exact target files, map entries, draft ADR,
