improvements:
  - title: "Add an automated prereq/data-readiness probe before the concierge gate"
    detail: >
      A pre-concierge step should query BQ for actual row counts on the named consumption
      tables and verify advertiser identity against klever_core_entities.advertiser. B1
      (identity) and B2 (zero rows) are mechanically checkable facts. Surfacing them
      automatically would let the concierge FAIL faster and with hard evidence attached,
      rather than relying on prose findings.
  - title: "Concierge gate must treat unverified source-of-truth as a blocking FAIL, not a soft confidence"
    detail: >
      When the live Jira ticket contradicts verified entity data (advertiser 357 vs 835),
      the gate should hard-FAIL with needs_human and emit the exact correction to apply,
      rather than producing an 82-confidence outcome. Codify: any source-of-truth conflict
      => spec_quality FAIL, confidence reported as low, with the staged correction file path
      in the output.
  - title: "Require named BQ tables + schema for any data-sourcing AC before the spec gate passes"
    detail: >
      Contract 1 (concierge) should reject data-sourcing ACs (like AC-1) that name no concrete
      table/schema/join-key. Add a checklist: every 'reads from BQ' AC must cite a table name,
      a column-level schema reference, and the join key. Missing any => ambiguous => FAIL.
  - title: "Calibrate concierge confidence semantics for FAIL outcomes"
    detail: >
      Define confidence on a FAIL as 'certainty that the FAIL is correct', not 'how close to
      passing'. A FAIL backed by verified contradicting data should report HIGH confidence
      (e.g. 90+) that halting was right. Document this in contract 1 so retro telemetry is
      comparable across runs.
  - title: "Escalate staged-but-unapplied Jira corrections through the human-gate output"
    detail: >
      When the factory has already staged a corrected ticket description on disk, the concierge
      output should explicitly list it as an actionable human task (update Jira #34347 / apply
      description-corrected-2026-06-02.txt) so the blocker has a one-step resolution path.

