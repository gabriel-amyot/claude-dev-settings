improvements:
  - title: "Make the visual-verify handoff the immediate, mechanical next step on NEEDS_VISUAL_VERIFY"
    detail: >
      When a run terminates NEEDS_VISUAL_VERIFY, the retro/ship loop should auto-emit a ready-to-run
      ui-probe instruction for the exact render ACs (here AC-1 list renders + multi-select, AC-3
      empty-state notice on filtered-to-zero, AC-5 control hidden when doohVisible off), targeting
      the pushed branch on local stack or dev. The branch is built and pushed; the only gap is a
      live capture. Don't leave that as prose — emit the precise /ui-probe or /klever-test option
      with the URL and the three assertions.
  - title: "Write a review artifact to review/ even when criticals:0"
    detail: >
      Contract 5 (review) should always drop review/review-report.md (what was checked, the
      criticals:0 verdict, any non-blocking nits) into the ticket's review/ folder, not just return
      the verdict in the trace. Same for the TDD phase dropping a tdd/ledger. Empty named folders
      mean a future reader (or this retro) cannot reconstruct the pass without re-deriving it.
  - title: "QA gate should triage typecheck/lint failures against the changed file set"
    detail: >
      Contract 6 (QA) runs lint:types and gets 9 errors here, ALL pre-existing and none in the
      branch's files. The gate should diff the failing files against `git diff --name-only
      origin/dev...HEAD` and annotate each as MINE (regression, blocks) vs PRE-EXISTING (repo debt,
      does not block this ticket). Surfacing a raw wall of tsc red without that split forces manual
      proof and risks either a false halt or a missed real regression.
  - title: "Apply assumption-audit discipline to retro-prescribed blockers"
    detail: >
      The prior KTP-792 retro prescribed a hard hold on a KTP-791 dependency that the grill then
      disproved against origin/dev. Retro improvements that assert a code/data blocker ('X does not
      exist until Y merges') must cite the same kind of evidence the grill demands (git show on the
      default branch), or be downgraded to 'hypothesis to verify in next run's grill.' A write-only
      false hold is worse than no handoff. Add a check: before a retro emits a 'do not re-dispatch'
      directive, require a one-line evidence cite or mark it tentative.
  - title: "Verify clearDoohCategories is wired or dropped (grill G1)"
    detail: >
      The grill flagged clearDoohCategories as potential exported-but-unused dead code (G1) and
      recommended dropping it unless a 'Clear' affordance is added. The diff added it to map-store.
      The visual-verify pass or a quick grep should confirm it has a UI trigger; if not, drop it in
      a follow-up commit before MR to honor the no-orphan-exports preference.
  - title: "Close the loop on the stale false-blocker handoff for KTP-792"
    detail: >
      sessions/active/prompts/dark-factory-improvements-KTP-792.md (from the 2026-06-11 no-op) still
      tells a future session to hold KTP-792 for KTP-791. Mark it superseded by this run's handoff
      (dark-factory-improvements-2026-06-15-KTP-792.md) so the false hold is not picked up.

