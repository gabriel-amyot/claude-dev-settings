improvements:
  - title: "Capture the skip cause when agent() returns null"
    detail: >
      In dark-factory.workflow.js, when an agent() call returns null, attach a 'skip_reason' (last
      error class: schema-validation-exhausted / dispatch-error / permission-denied / user-skip)
      and a truncated raw last response to the HALT_AGENT_SKIPPED terminal payload. Today the
      terminal status carries zero diagnostic; this run cannot be root-caused.
  - title: "Record failed dispatches in the per-phase trace"
    detail: >
      rec() only fires on success, so a dead run emits per_phase=[]. Add a trace entry
      { phase, status: 'SKIPPED', attempts, error } on every null agent return so retro has signal
      even when the line dies at the front gate.
  - title: "One bounded retry for null returns on read-only phases"
    detail: >
      Concierge (and Grill/Review, which mutate nothing) should get exactly one retry on a null
      agent return before halting. A transient dispatch failure currently costs a full run slot.
      Keep zero retries for mutating phases (Implement/Fix/ShipPrep).
  - title: "Deterministic ticket-folder fallback in workflow.js"
    detail: >
      On any terminal return where concierge.ticket_folder is missing, glob
      tickets/*/{*,no-epic}/<TICKET> (and tickets/sprints/*/<TICKET> symlinks) and stamp the result
      into the payload. KTP-695's folder existed and was resolvable without any agent.
  - title: "Concierge must consume existing pre-sprint spec-gate artifacts"
    detail: >
      Contract 1 should instruct the concierge to check
      <ticket_folder>/reports/reviews/*spec-gate*.md before re-deriving spec quality. KTP-695 has a
      complete 88/100 Leo gate (2026-06-10) with four resolvable gaps and verified BQ evidence
      (dev bridge table 32 rows; prod dts_external_data nonexistent). The re-run should import
      those gaps as defaults/open_questions instead of re-querying BQ from scratch.

