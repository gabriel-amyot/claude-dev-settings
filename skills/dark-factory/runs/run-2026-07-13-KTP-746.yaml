    status: FAIL
    confidence: 90
    note: >
      Correct, very-high-confidence stop. The concierge re-verified the blocker LIVE on 2026-07-13
      against a fetched origin/dev checkout: (1) all three map tables (proximity_daily_geo_zip /
      _country / _conversions) STILL lack any campaign column via bq show --schema; (2) the map
      request models on origin/dev (MapStateDataRequest et al.) still carry only
      advertiserId/dates/ids/country/channels — no campaign field. The core AC-3 ("changing the
      filter updates the map and metrics to the selected campaign") therefore cannot be built by any
      amount of frontend/backend work: the campaign data dimension does not exist in the tables that
      feed the map. The real prerequisite is a Dataform pipeline change in klever-data-workflow (a
      third repo, GitHub not GitLab, compiles from the prod branch, daily 8-12 UTC tag run) that has
      NOT landed, plus an unresolved PO decision (Q2) because VISITS/DISTRIBUTED_VISITS (Placer foot
      traffic) have no campaign attribution, making "the metrics" unsatisfiable as written. This is
      exactly the shape a Leo pre-sprint spec gate had already scored MIS_SCOPED 46/100 on
      2026-06-10 and recommended splitting into data -> backend -> frontend tickets. Confidence 90
      (higher than the analogous KTP-762 stop at 82) because the blocker was both pre-documented AND
      re-verified live today, and the concierge refused to guess past a cross-repo data prerequisite
      it has no belt to satisfy.

