improvements:
  - title: "Add a pre-flight 'visual-AC feasibility' gate before the implement phase"
    detail: "workflow.js should detect rendered-UI / interaction ACs (the belt already classifies them) and, before spending implement+review+qa, check whether visual verification is achievable this run: is dev up (IAP not 302) AND is a drivable authenticated browser available? If not, surface a single up-front decision ('visual ACs will land at PARTIAL tonight — proceed code-only or defer?') instead of discovering it at QA. This kills the recurring KTP-728/758/759 HALT_PRESHIP surprise."
  - title: "Let the frontend belt run UI ACs against the local stack as a fallback when dev is down"
    detail: "The QA contract caps UI ACs at PARTIAL whenever it cannot reach dev. But /klever-local-stack + ui-probe against localhost:3000 (auth on :3000) can render the panel locally without IAP. Teach the QA belt to fall back to the local stack for rendered-UI ACs when dev is in its nightly-off window, so pin-click-opens-panel and X/ESC-close can reach a true PASS autonomously."
  - title: "Separate pre-existing typecheck noise from run signal in the QA gate"
    detail: "QA already knows dev carries 6 pre-existing tsc errors in __tests__ files. The gate should diff the changed-file set against the error set and emit two counts (run-introduced: 0, pre-existing: 4) so a reader never has to manually attribute. Fail only on run-introduced errors."
  - title: "Auto-file a follow-up for undemonstrated LOW review hunches instead of dropping them"
    detail: "The Number.isFinite no-coercion hunch is correct-for-now but a latent fragility. When review records demonstrated:false LOW findings, retro (or the ship loop) should append them to a 'deferred hardening' list in the ticket so they are not silently lost — cheaper than re-discovering it as a prod bug."

