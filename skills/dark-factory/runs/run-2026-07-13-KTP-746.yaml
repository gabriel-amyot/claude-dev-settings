improvements:
  - title: "Wire the pre-dispatch triage filter that the KTP-762 retro already proposed"
    detail: >
      This is now the top improvement because the same gap recurred. Before a ticket enters the
      dark-factory line, check for a prior Leo/spec-gate report on the ticket (here
      reports/reviews/sprint6-spec-gate-2026-06-10.md scored MIS_SCOPED 46/100) or an analyst
      classification that flags a cross-repo data prerequisite / "NOT a self-contained code change".
      If found, short-circuit dispatch and route to a human-decision / split queue instead of
      spending a concierge cycle re-confirming a documented blocker. Concretely: workflow.js should,
      at concierge entry, look for the newest reports/reviews/*spec-gate*.md and any analyst/ac.json
      with a backend_gated/cross-repo verdict, and refuse-to-start with a pointer if the core AC is
      gated. Promote this from a per-run red flag (three runs running) to a tracked gate change.
  - title: "On BLOCKED_SPEC_QUALITY, auto-surface the blocking questions to the PO via Jira"
    detail: >
      Per the CLAUDE.md "A Deferred AC Is an Open Question" SOP, a decision-gated halt must produce a
      Jira comment tagging the decision owner, not disk-only parking. KTP-746 already has a fully
      drafted, PO-addressed clarifying-question comment with recommended defaults
      (reports/reviews/sprint6-question-draft-2026-06-10.md) that was never posted. The factory should,
      on this terminal status, hand that draft to /post-comment (human-gated preview) so Amal sees
      Q2 (metrics attribution) and the scope split — otherwise the ticket re-enters the line still
      blocked. Same improvement carried from the KTP-762 retro; it keeps recurring.
  - title: "Emit a teed-up split proposal artifact instead of a bare halt"
    detail: >
      The blocker decomposes cleanly and the pieces are already known: (1) DATA — Dataform change in
      klever-data-workflow to carry DSP_CAMPAIGN_ID/NAME through proximity_daily_geo_zip/_country/
      _conversions (with the backfill + cardinality question and the TTD-vs-generic-DSP-vs-Canada
      coverage question); (2) BACKEND — optional campaign param on MapDataController request models +
      adapters in app-proximity-report, and the campaign-list source decision (existing
      /api/v1/campaigns reads the DSP export dataset, not the proximity dataset); (3) FRONTEND — the
      actual UI slice in app-front-portal (small: components/map/components/filters/ already has the
      channel/CollapsibleFilters pattern). The concierge has verified all of this; it should write a
      short split memo to the ticket reports/ so the human turns a halt into three dispatchable
      tickets in one read rather than re-investigating.
  - title: "Document the tool-belt coverage boundary for Dataform / GitHub prerequisites"
    detail: >
      The core prerequisite here is Dataform SQLX in a GitHub repo compiling from the prod branch on a
      daily tag run — no racked belt (java/scripting/frontend/terraform-dac-infra) covers it. Add a
      note to the toolcrib so this class of prerequisite is recognized as out-of-line at triage, and
      the concierge can cite "no belt covers klever-data-workflow" as an explicit halt reason rather
      than discovering it mid-analysis.
  - title: "Fix session resolution so the retro handoff lands in the owning session, not the ticket folder"
    detail: >
      sessions/active/state.yaml had an empty session_id, so this retro could not resolve the active
      session and fell back to writing the handoff into the ticket's reports/ folder. The retro phase
      (or an upstream session-init step) should ensure state.yaml carries a resolvable session_id, or
      the contract should define a deterministic fallback (e.g. newest-mtime session dir) so
      improvement handoffs consistently reach the session that will act on them.

