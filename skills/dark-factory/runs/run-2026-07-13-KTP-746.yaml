title: >
  Add a Campaign filter to the Measurement Map: a campaign selector alongside the existing filters
  that, when changed, rescopes the map + metrics to the selected campaign (default "All campaigns",
  empty state on no data). Epic KTP-559 (Measurement Map Phase 2). Repos: app-front-portal (UI),
  app-proximity-report (campaign param on MapDataController models), klever-data-workflow (Dataform
  prerequisite: carry DSP_CAMPAIGN_ID/NAME through the proximity_daily_geo_* tables).
