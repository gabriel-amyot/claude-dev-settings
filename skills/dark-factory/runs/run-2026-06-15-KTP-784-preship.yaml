improvements:
  - title: "Make ShipPrep do the mechanical version bump + CHANGELOG before halting at PRESHIP"
    detail: >
      For a frontend repo (package.json + CHANGELOG.md, no git tag from CI) the version patch bump and
      a one-line changelog entry are deterministic and need no human judgment. ShipPrep should perform
      them and commit them on the branch, so HALT_PRESHIP leaves the branch genuinely one MR click from
      done. Today the gate halted with package.json untouched at 1.1.64, pushing mechanical work onto
      the human/resume. Reserve the halt for the MR-creation + Jira-comment step that legitimately needs
      a human (or the main loop).
  - title: "Capture the approved AC-3 visual baseline during QA, or emit NEEDS_VISUAL_VERIFY"
    detail: >
      AC-3's only in-scope deliverable was the Q3-approved pre-upload baseline (US NY + CA ON via
      ui-probe). QA ran typecheck/build/boot but skipped the screenshot, and PRESHIP then forfeited it
      (screenshots/ empty). The QA contract should, for any AC marked visual_pending with an approved
      baseline, attempt the ui-probe capture; if it cannot (dev down, auth), set terminal status
      NEEDS_VISUAL_VERIFY (as the sibling 2026-06-15 KTP-792 run did) instead of reaching PRESHIP with
      no visual proof at all.
  - title: "Review must always write a findings artifact, even when criticals:0"
    detail: >
      The review phase reported criticals:0 / conf 88 but the ticket review/ folder is empty. Contract 5
      (review) should require an on-disk findings file (scope reviewed, criticals/majors/minors counts,
      one-line rationale) before returning PASS — same principle as 'QA may not PASS without a test_ref'.
      A clean review with no record is indistinguishable from a skipped review to a future reader.
  - title: "Emit a one-line telemetry record from the ledger-repair retry"
    detail: >
      The bounded ledger-repair retry (prior retro improvement #3) converted this run from HALT_TDD_GATE
      to a normal advance — exactly as designed — but left no measurable footprint beyond the populated
      tdd/*.md files. The retry should append a record (violations seen, AC entries re-emitted, gate
      result after) so its hit-rate and false-positive rate are trackable across runs and the improvement
      can be proven to be paying off.
  - title: "Ship the QA baseline-diff alongside the failing output, and label PARTIAL with the cause"
    detail: >
      QA correctly proved 'no new typecheck errors' by diffing AC-1-typecheck.out against
      AC-1-typecheck-dev-baseline.out (identical, 9 pre-existing). But the PARTIAL verdict in the trace
      doesn't say WHY it's partial (the missing AC-3 visual, not the typecheck). QA's verdict should
      carry a one-line cause string ('partial: AC-1 clean vs baseline; AC-3 visual not captured') so the
      retro and the human don't have to reconstruct it from four .out files.
  - title: "Finish KTP-784's frontend pass from the pushed branch — RESUME, do not rebuild"
    detail: >
      The code is done and correct on KTP-784-state-centers-promoteid (85730fc, pushed); TDD, Review,
      and QA-no-regression are cleared. To reach READY_TO_SHIP: (1) version patch bump + CHANGELOG entry
      for KTP-784, (2) capture the AC-3 pre-upload baseline (US NY + CA ON), mark visual_pending,
      (3) create the MR + Jira comment via /klever-mr + /post-comment. Then post the still-owed AC-0
      spec-gate confirmation comment. Finally, queue the AC-2 scripting-belt pass (regen .mbtiles +
      script diff; Gabriel does the manual Mapbox upload). Do NOT restart the factory.

