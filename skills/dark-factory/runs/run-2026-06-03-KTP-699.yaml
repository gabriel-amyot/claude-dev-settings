improvements:
  - title: "Block re-running a ticket whose prior run halted needs_human until the open_questions are answered"
    detail: >
      The workflow.js front gate should read the latest runs/run-*-<TICKET>.yaml (or the ticket's
      analyst/ac-list.json open_questions). If the prior terminal status was BLOCKED_SPEC_QUALITY /
      needs_human and the open_questions are still unanswered, refuse to start a fresh run and instead
      point at the pending decision. KTP-699 ran the concierge gate twice; the second pass cleared B1+B2
      (good) but the human-decision blocker (Q1) was still open, so it was always going to halt again.
  - title: "Add a pre-concierge geo/centroid-readiness probe for any map-rendering AC"
    detail: >
      Mirror the data-readiness probe idea but for geometry: when an AC renders origins on a map, the
      probe should check that a centroid/coordinate source exists for the origin geography (US ZIP/county
      vs Canadian FSA). For KTP-699 it would mechanically surface F5 (no FSA centroid in BQ) and F6
      (frontend loads only US centroids) before the human-facing gate, attaching hard evidence to Q1.
  - title: "Spec linter: flag any 'no <layer> changes expected' claim that an AC observably contradicts"
    detail: >
      Contract 1 should cross-check scope claims against the ACs. KTP-699 says 'frontend: no changes
      expected' while AC-2 requires Canadian FSA flow lines to render, and origin/dev proves the frontend
      drops unknown origins. Any 'no X changes' assertion that an AC needs X => raise it as an
      open_question (re-scope), not a silent assumption."
  - title: "Calibrate concierge confidence semantics for FAIL outcomes (still open from 06-02)"
    detail: >
      Define confidence on a FAIL as 'certainty that halting was correct', not 'how close to passing'.
      A FAIL where source-of-truth is now CLEAR and exactly one human decision remains (KTP-699 Q1)
      should report HIGH confidence (90+) that the halt is right. This was proposed in the 06-02 retro
      and is NOT yet codified — the 06-03 run again landed 82 on a clean halt. Codify in contract 1."
  - title: "Pin the data-derived AC facts into ac-list.json on every re-run (this run did it well — make it the standard)"
    detail: >
      The 06-03 concierge correctly added a `concierge_revision` line and VERIFIED facts (F1-F6) to
      assumptions.json showing what changed since the prior run. Make this the required shape: every
      re-run must diff its findings against the prior run's telemetry and record resolved vs still-open
      blockers explicitly, so retro can score progress, not just absolute state."

