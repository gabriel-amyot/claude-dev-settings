improvements:
  - title: "STOP the batch: circuit-break after the first HALT_AGENT_SKIPPED and diagnose the dispatcher"
    detail: >
      Five tickets died at the identical pre-concierge null in one day. Apply the pipeline-retry
      circuit-breaker principle to agent dispatch: when a run terminates HALT_AGENT_SKIPPED at the
      FIRST phase, the dispatcher (sprint-factory loop or human) must halt further ticket
      dispatches until the harness fault is identified and fixed. Do not re-dispatch anything,
      KTP-791 included, before this diagnosis.
  - title: "Capture skip_reason in every HALT_AGENT_SKIPPED return"
    detail: >
      Extend agent() / the null-guard sites in dark-factory.workflow.js to surface WHY the return
      was null — user_declined | dispatch_error | timeout | schema_validation_failed | unknown —
      and include it in the halt object and the trace. Filed in the KTP-677 retro; still the top
      diagnostic gap after four more failures.
  - title: "Retry idempotent read-only phases once before halting"
    detail: >
      On a null agent() return at Concierge (or Grill), retry exactly once (same prompt, label
      suffixed '-retry') before emitting HALT_AGENT_SKIPPED. Bounded to one retry.
  - title: "Resolve ticket_folder mechanically in workflow.js before the concierge"
    detail: >
      Glob project-management/tickets/*/**/<TICKET> (archive/ fallback) at run start and carry it
      in run context. KTP-791 resolves unambiguously to tickets/KTP/KTP-748/KTP-791; the halt
      should never have reported '(unresolved)'.
  - title: "Emit a stub trace entry for every attempted phase, including skips"
    detail: >
      Record an 'attempted' stub (phase, timestamp, outcome: skipped + skip_reason) at dispatch
      time and finalize on return. Retro must never receive [] for a run that consumed a dispatch.
  - title: "Concierge must detect already-implemented tickets and select a review/ship belt, not a build belt"
    detail: >
      KTP-791 has open MRs (!112, !269), a QA report, and an adversarial review on disk from a
      prior pipeline. The concierge contract should check for existing branch/MR/artifacts and
      classify the run as review+validate+merge instead of greenfield build. Without this, a
      successful re-dispatch would still do the wrong work.
  - title: "Re-dispatch KTP-791 as review+ship with mandatory warm-start context"
    detail: >
      When the dispatcher is fixed: (1) post the scope-confirmation comment on KTP-791 via
      /post-comment (backend Goldfish enrichment in-scope per the 2026-06-08 front-gate decision;
      also state the Goldfish-unavailable degrade-to-"Other" behavior, Leo Gap 2); (2) review !112
      and !269, confirming the two ship-blocker fixes (snake_case location_type key; @Cacheable
      self-invocation) are present; (3) verify !269 rebases clean on current dev with merged
      KTP-759; (4) merge backend !112 first, then !269; (5) on-map dev validation of all 4 ACs.
      Feed reports/reviews/sprint6-spec-gate-2026-06-10.md and SCOPE-DECISION.md to the first
      agent as required reading.
  - title: "Reconcile runs/INDEX.md with the runs directory"
    detail: >
      run-2026-06-10-KTP-739 and run-2026-06-11-KTP-704 have telemetry files but no index line.
      Add a retro contract step (or a tiny lint) asserting one index row per YAML in runs/.

