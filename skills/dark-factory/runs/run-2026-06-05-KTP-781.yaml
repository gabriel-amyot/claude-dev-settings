improvements:
  - title: "Concierge must consume pre-existing ticket diagnosis reports and down-scope or block before driving the pipeline"
    detail: >
      KTP-781's folder already contained reports/diagnosis/2026-06-03-conversions-data-gap-verification.md
      proving AC1/AC3 are unsatisfiable on dev (BTG adv 835 = 0 conversion rows). The concierge contract
      should scan reports/diagnosis and reports/status for known blockers and, when found, either (a) block
      with BLOCKED_DATA_DEPENDENCY, or (b) explicitly down-scope the run to the satisfiable ACs (here:
      AC2 backend, partial AC4) so QA's PARTIAL on AC1/AC3 is EXPECTED, not re-discovered. This would have
      saved the cost of a full design->implement->QA cycle whose halt was already known. Highest-leverage fix."
  - title: "Add a belt-vs-AC coverage gate that flags mixed-belt tickets at concierge"
    detail: >
      AC1/AC3 are frontend; AC2/AC4 are backend. A single java-belt run is structurally incapable of closing
      a mixed ticket. The concierge should classify each AC's belt and, when ACs span belts, warn that the
      run can at best reach PARTIAL on out-of-belt ACs — and recommend splitting the ticket (backend AC2/AC4
      vs frontend AC1/AC3) or running two belts. This is a recurring pattern (KTP-758, KTP-699): frontend ACs
      keep arriving on backend tickets and getting forced to PARTIAL."
  - title: "Add a JDK-version preflight to the java tester socket"
    detail: >
      QA only got 12/12 green by manually setting JAVA_HOME=temurin-17; the default JDK 25 yields 12 Mockito
      inline-mock errors that look like real failures. The java belt should read pom.xml maven.compiler.target
      (17 here), verify a matching JDK is on JAVA_HOME before running tests, and auto-select/abort with a clear
      message otherwise. Prevents a correct change being mis-scored RED on a host with a newer default JDK."
  - title: "QA must not label a real-data AC 'PASS at structural level' — separate structural coverage from AC acceptance"
    detail: >
      AC4's acceptance bar is a real-BQ before/after county-TOTAL numerical parity check; the unit tests only
      prove query construction. The QA schema should distinguish structural_verified (query/shape compiles and
      asserts) from ac_verified (the AC's actual acceptance condition met). AC4 is structural_verified=true,
      ac_verified=false -> PARTIAL, and the language should never read as 'PASS'. Mirrors the KTP-758
      execution_verified-vs-ac_verified improvement; promote this to a standard QA schema field."
  - title: "Require positive evidence (or an explicit accepted-risk record) for data-dependent LOW findings"
    detail: >
      The LOW COUNTY_FIPS/CDUID-both-NULL finding was dismissed by analogy to KTP-754's live precedent. That
      is sound, but the review should either capture a one-row real-BQ probe confirming no US rows have both
      NULL, or record an explicit accepted-risk entry with the AC's own waiver text — so 'rebutted by analogy'
      is logged as a decision, not an undemonstrated hand-wave."

summary: >
  KTP-781 (Canada county/CD conversions, java belt) executed a clean, narrow backend change — AC2 fully
  proven with 12/12 tests, 0 review criticals — but HALT_PRESHIP because 3 of 4 ACs are PARTIAL: AC1/AC3
  are both frontend AND data-blocked (Blinds To Go has zero conversion rows on dev, a gap the ticket folder
  already documented before the run), and AC4 needs a real-BQ numerical parity check unit tests cannot give.
  task_confidence 64, factory_fitness 78. The highest-leverage fix is a concierge gate that reads the ticket's
  own pre-run diagnosis to down-scope or block a run whose halt is already known.
