improvements:
  - title: "Ship gate must block (or force an explicit decision) on demonstrated HIGH findings, not just criticals"
    detail: >
      workflow.js / contract 8 (ship-prep) currently gates only on criticals_open == 0. Add: if any
      review finding has severity HIGH AND demonstrated == true, the gate emits HALT_PRESHIP_HIGH (or
      requires an explicit recorded override with rationale) instead of READY_TO_SHIP. The latitude
      distortion bug had a runnable harness that exits 1 — exactly the signal a ship gate should respect.
  - title: "Wire a runtime fallback into QA for React-store / map-vs-panel integration assertions"
    detail: >
      Contract 6 (qa) should, when a repo has no vitest/jest runner, fall back to ui-probe or
      agent-browser to assert state-store-driven UI (e.g. panel FSA list == map-attributed FSA list)
      rather than accepting code-trace-only coverage. Add a QA sub-step: "if AC asserts UI reflects
      store state and no JS test runner exists, capture a live runtime sample." This would have caught
      the panel/map divergence as a real PASS/FAIL instead of a MEDIUM trace note.
  - title: "Invalidate stale result.yaml when branches change (respec / branch re-point)"
    detail: >
      The prior result.yaml certified superseded Option-A branches and was only caught because QA
      re-read the branch tips. Contract 6 should record the certified branch HEADs in result.yaml and
      the QA entry gate should refuse to trust an existing result.yaml whose certified HEADs != current
      branch tips, forcing a fresh QA pass. Mechanical, removes the manual stale-detection burden.
  - title: "Geographic-distance correctness check in review for any nearest-point / distance code"
    detail: >
      Add a review heuristic (contract 5): when a diff computes distance between lat/lng pairs using
      raw subtraction / squared degrees, flag it HIGH and demand cos(latitude) scaling or haversine.
      This is a recurring class of bug at non-equatorial latitudes; codify it so the reviewer catches
      it by pattern, not by luck.
  - title: "Surface accepted AC evidence gaps as an explicit ship-handoff acknowledgement"
    detail: >
      When QA records evidence gaps below the PASS bar (live-BQ curl, browser styling), the ship handoff
      should list them as "shipped without runtime proof: X, Y" so the human MR reviewer sees them
      up front rather than buried in result.yaml coverage notes.

