improvements:
  - title: "Concierge must live-verify any data-layer blocker before emitting it"
    detail: >
      Contract 1: when an open_question or blocker asserts a data-layer fact (a BQ table/view exists or
      is missing, a column is present/absent, a serving path), the gate MUST verify against the live
      source (`bq ls` / `bq show --schema` / `bq query`, or `git show origin/dev:<path>` for code)
      before raising it as needs_human. Stale local working trees are explicitly NOT evidence. This run
      burned two human gate passes on a view that does not gate the path. Add an assumption-audit line to
      every blocker: "what established this, and could the premise be false?" (mirrors the project
      CLAUDE.md adversarial assumption-audit rule).
  - title: "Add a live-schema preflight that feeds the analyst/design schema facts"
    detail: >
      Before design writes column lists, run `bq show --schema` on every table named in affected-repos.json
      and pin the exact column count + names into assumptions.json as VERIFIED facts. F4 (no COUNTRY
      column) and the 22-vs-20 country-column error would both have been caught mechanically instead of
      relying on the grill to find them. This is the data analogue of the prereq probe proposed in the
      KTP-699 retro.
  - title: "Concierge must allocate a NEW advertiser ID for fabricated demo brands, never reuse an existing demo-advertiser entity"
    detail: >
      When the spec calls for a new dedicated demo advertiser, the concierge/design must mint an ID that
      is unused in BOTH the perf tables AND the user-management/demo-agency advertiser registry — not
      just one that currently has 0 perf rows. 827 = FitConnect already exists as a demo entity; binding
      'Lumberjack Pastries' to 827 invites an identity collision. Add an advertiser-identity check
      against klever demo-agency entities to the concierge, citing the KTP-699/KTP-755 lesson."
  - title: "Split single-AC tickets whose AC cannot fully pass on the deployed backend"
    detail: >
      The concierge should detect when an AC's sub-criteria depend on an un-landed backend change (here:
      CD-layer coloring needs CountyPerformanceBigQueryAdapter to read CDUID) and either (a) flag the AC
      as partially-deferred with the exact backend dependency named, or (b) recommend splitting the
      seedable portion (province + FSA) from the backend-gated portion. Avoid carrying a partially-
      unachievable AC all the way to a PARTIAL QA.
  - title: "Require a structured review-findings file and a QA test_ref artifact in the ticket folder"
    detail: >
      Contracts 5/6 should write review/findings.json (even if criticals:0) and qa/result.yaml with a
      test_ref (command + output path) into the ticket folder, not just a raw diff.patch. The retro had
      to reconstruct the PARTIAL verdict from the grill report; a PARTIAL QA with no test evidence record
      is a telemetry gap. (Mirrors the KTP-699 retro 'require test_ref before PASS' improvement.)"
  - title: "Fix the resume path or document run-fresh as the canonical unblock"
    detail: >
      resumeFromRunId + humanDecisions returns BLOCKED_NEEDS_HUMAN_AGAIN because the cached concierge
      still reports needs_human. Either re-run the concierge gate on resume (so a Jira-side resolution is
      re-read) or document in the workflow that the supported unblock is 'resolve in the ticket, start a
      fresh run' and have the orchestrator say so explicitly instead of looping on a stale verdict.

