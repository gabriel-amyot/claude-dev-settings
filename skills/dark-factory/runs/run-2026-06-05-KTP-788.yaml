improvements:
  - title: "Add a pre-flight 'visual-AC feasibility' gate before the implement phase"
    detail: >
      workflow.js should detect rendered-UI ACs (the belt already classifies them) and, before
      spending implement+review+qa, check whether visual verification is achievable this run: is a
      drivable authenticated browser available AND does a renderable fixture exist for the AC's data
      condition? If not, surface a single up-front decision ('visual ACs will land at PARTIAL — proceed
      code-only or defer?') instead of discovering it at QA. Kills the recurring KTP-728/758/759/788
      HALT_PRESHIP surprise.
  - title: "Require a fixture-availability check for data-conditional UI ACs"
    detail: >
      KTP-788's ACs are all Canada-specific (FSA empty state, FSA flow color, FSA modeled labels) but
      there is no live Canadian FSA-origin store fixture for the factory. The concierge/design phase
      should, for any AC gated on a specific data condition (country===CA, granularity===fsa), confirm a
      seedable/local fixture exists OR record up front that the AC is logic-only-verifiable this run.
      Pair with /klever-local-stack + a seeded CA store so the FSA panel/flow lines/legend can render
      locally and reach a true PASS without IAP or Placer CA coverage.
  - title: "Gate AC-vs-implementation mechanism drift before the ship loop"
    detail: >
      AC-3 was implemented with a modeled HUE instead of the AC's suggested dashed style. When the
      implementor deviates from a written AC mechanism (even when intent is met), the workflow should
      flag it as a PO-confirmation item (ADR-draft -> inbox/Jira comment) before HALT/ship, so closure
      is not blocked later by 'that's not what the AC said'.
  - title: "Separate pre-existing typecheck noise from run signal in the QA gate"
    detail: >
      QA already knows dev carries pre-existing tsc errors in __tests__ files. The gate should diff the
      changed-file set against the error set and emit two counts (run-introduced: 0, pre-existing: 4) so
      a reader never manually attributes. Fail only on run-introduced errors.
  - title: "Auto-capture undemonstrated MEDIUM/LOW review findings as deferred hardening"
    detail: >
      The origins[0].granularity mixed-list mislabel is correct-for-now but latent. When review records
      demonstrated:false MEDIUM/LOW findings, retro (or the ship loop) should append them to a
      'deferred hardening' list in the ticket reports so they are not silently lost — cheaper than
      re-discovering as a prod bug if a mixed-market origin list ever becomes reachable.

