improvements:
  - title: "Write the TDD ledger to tdd/AC-N.md, not just qa/*.out"
    detail: >
      The java belt (or contract 4/implement) captured RED proofs as raw qa/red-ac1..3.out but left the
      tdd/ directory the design plan named EMPTY. Make the build station write the failing-then-passing
      proof for each AC into <ticket_folder>/tdd/AC-<N>.md (RED command + output snippet, then GREEN
      command + output snippet), which is the canonical location the TDD gate and this retro look for.
      Keep the raw .out files in qa/ as backing evidence, but the ledger is the contract artifact.
  - title: "Name QA suite artifacts by the JDK/config they actually ran under, asserted from content"
    detail: >
      full-suite-java21.out contained the JDK17 success and full-suite.out the JDK21 failure — inverted.
      Have the test socket name the file from the JAVA_HOME it actually used (e.g. full-suite-jdk17.out)
      and write the resolved java -version as the first line of every suite .out, so the filename can
      never lie about its contents.
  - title: "Pin JAVA_HOME=temurin-17 mechanically in the java belt build/test sockets"
    detail: >
      A JDK21 full-suite run was executed and false-failed (Lombok TypeTag on MapDataControllerTest)
      before the JDK17 run. The repo CLAUDE.md, design plan, and grill all flagged JDK17 as a hard gate.
      The java belt should export JAVA_HOME to the temurin-17 path for every mvn invocation (compile,
      test, run) rather than relying on the agent to remember, eliminating the wasted JDK21 cycle and
      the risk of a JDK21 false-FAIL being mistaken for a real test failure.
  - title: "Surface zero-reference-after-deletion classes as an explicit follow-up, not a disk-only note"
    detail: >
      model/response/ErrorResponse.java is now dead code (0 refs) by a correct conservative scope call.
      Ship-prep / retro should emit such "orphaned by this ticket, deliberately out of scope" findings
      to GABRIEL_INBOX.md (or auto-draft a 1 SP cleanup ticket) so the observation that currently lives
      only in design/impl-plan.md and grill-report.md does not silently rot. Per the deferred-AC rule, a
      disk-only parking note isn't enough.
  - title: "Record an explicit ship-prep deploy-verification note for pure-deletion tickets"
    detail: >
      For deletion tickets whose runtime proof is @WebMvcTest 404 (local execute-verify infra_blocked),
      ship-prep should write a one-line post-merge check ("after dev deploy, GET /api/v1/geography/states
      must return 404") into the ship-prep output so the main-loop / human validation step has a concrete
      on-dev assertion rather than re-deriving it. Closes the gap between @WebMvcTest 404 and on-dev 404.
  - title: "Capture/resolve the active session for the improvement handoff"
    detail: >
      sessions/active/state.yaml session_id was empty again, so the handoff fell back to the shared
      prompts/ folder (as the KTP-677/704/784/791/792 retros did). The factory should resolve and stamp
      the originating session on each run so the retro handoff lands in that session's own prompts/ and
      attribution is unambiguous. Recurring across every 2026-06-11 retro.

