improvements:
  - title: "Add a dependency-availability gate at concierge for cross-ticket backend deps"
    detail: >
      The concierge contract should detect when a frontend ticket's ACs depend on an endpoint
      owned by another ticket (KTP-758 → KTP-756 GET /proximity-report/api/dooh/screens) and check
      whether that endpoint is on origin/dev BEFORE driving the pipeline. If absent, either block
      with BLOCKED_DEPENDENCY (cheaper than a full pipeline that is predestined to HALT_PRESHIP) or
      explicitly down-scope the run to 'build + unit/pure-fn proof only' so QA's PARTIAL is expected,
      not a surprise. This is the highest-leverage fix: it would have saved an entire implement+QA
      cycle here.
  - title: "Stand up a standing authenticated frontend QA stack (or a mock-backend mode) for the frontend belt"
    detail: >
      Two consecutive runs (KTP-699 06-03, KTP-758 06-04) capped frontend ACs at PARTIAL solely
      because a headless agent cannot complete Auth0/IAP login. The frontend belt's tester socket
      should support a local authenticated stack (UM + MySQL + the relevant backend) seeded with a
      mock/fixture DOOH response, gated behind the feature flag, so rendered-pin / toggle / cluster
      ACs can reach PASS without the real upstream endpoint. Without this the frontend belt has a
      structural PASS ceiling on any data-rendering AC.
  - title: "Distinguish execution_verified from ac_verified in the QA schema"
    detail: >
      The QA result.yaml uses execution_verified=true to mean 'build/boot/route compiled', but 5
      ACs are PARTIAL. Add a separate field (e.g. ac_render_verified or live_verified) so 'the app
      boots' is never conflated with 'the AC behavior was exercised against real data'. Prevents a
      reader from over-trusting execution_verified.
  - title: "Require written proof specs to actually run (or be marked NOT_RUN) before QA reports on the AC"
    detail: >
      AC-6's flag-off spec (ktp-758-dooh-flag.spec.ts) exists but was never executed. Contract 8/QA
      should refuse to cite a proof spec as evidence unless it ran; an unrun spec must be reported
      as NOT_RUN with the reason, never silently treated as coverage.
  - title: "Pre-empt the 0-screen-viewport cache nit in the design phase"
    detail: >
      The LOW finding (cache guard `doohScreens.length > 0` never registers an empty viewport →
      harmless refetch on revisit) is a design-time cache-key concern. Design's caching ADR/notes
      should specify the empty-result caching policy so review does not have to flag it after the fact.

