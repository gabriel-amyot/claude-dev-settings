improvements:
  - title: "Auto-equip a frontend render verifier (ui-probe) for any AC that touches frontend code, even on the java belt"
    detail: >
      AC-3 landed PARTIAL solely because no screenshot/component test exercised the store-detail-panel
      FSA-label branch, despite live-proven data. The dark-factory tester socket should detect a
      frontend-touching AC (diff includes app-front-portal .tsx/.ts render code) and auto-dispatch a
      ui-probe panel render + screenshot, regardless of the primary belt being java. That single check
      would have closed AC-3 to PASS and avoided the PARTIAL pre-ship halt.
  - title: "Pin/verify the JDK in the java belt preflight before implement"
    detail: >
      A Java 25 / Byte Buddy / Mockito mismatch produced a transient test FAILURE that was an env defect,
      not a code defect, and cost a manual JDK-17 pin to clear. The java belt should assert
      JAVA_HOME=temurin-17 (or the repo's required toolchain) as a preflight gate before the implement
      phase runs tests, so a toolchain mismatch fails fast with a clear cause instead of masquerading as
      a code regression mid-run.
  - title: "Carry design-phase open ADR questions into a mandatory review checklist item"
    detail: >
      The MEDIUM (FSA/STATE GROUP BY duplication) and the volume-column ambiguity were both raised as
      draft-ADR questions at design, then built around, then re-found at review. Contract 2 (design)
      should emit its unresolved ADR questions as explicit review targets so contract 5 (review) MUST
      confirm each was resolved or is an accepted/documented risk — closing the design->review leak
      instead of relying on review to independently rediscover them.
  - title: "Pre-ship lint: cross-check CHANGELOG-named files against the actual diff"
    detail: >
      The CHANGELOG cited ca_fsa_centers.geojson while the diff changed ca_fsa_centroids.json. A cheap
      pre-ship step should parse filenames referenced in CHANGELOG.md entries for this branch and verify
      each appears in `git diff origin/dev..HEAD --name-only`, flagging any mismatch. Mechanically catches
      shipped-artifact documentation drift before the MR.
  - title: "Codify the pre-concierge geo/centroid-readiness probe (third run, still open)"
    detail: >
      Q1 (no FSA-centroid coordinate source) blocked two runs and was resolved by a human landing
      ca_fsa_centroids.json, not by the factory confirming readiness. For any map-rendering AC, a
      pre-concierge probe should verify a centroid/coordinate source exists for the origin geography
      (US ZIP/county vs Canadian FSA) and attach the row count + file path as evidence. Proposed in the
      06-03 retro and still uncodified — this run proves it would have shortened the path."
  - title: "Block re-running a ticket whose prior run halted needs_human until open_questions are answered (carried, partially borne out)"
    detail: >
      KTP-699 took three factory passes. The 06-02 and 06-03 halts were correct but the ticket should not
      have re-entered the factory until Q1 was decided/landed. The front gate should read the latest
      runs/run-*-<TICKET>.yaml and refuse a fresh run while the prior open_questions are unanswered,
      pointing at the pending decision instead. Still uncodified after three runs."

