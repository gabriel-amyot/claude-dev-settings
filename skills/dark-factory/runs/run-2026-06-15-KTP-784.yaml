improvements:
  - title: "Carry exempt declarations from design/grill into the implement agent's ac_tdd contract"
    detail: >
      The exemption was correctly decided in contract 2 (design impl-plan.md:40,48) and re-affirmed in
      contract 3 (grill A3/A4), then dropped. Contract 4 (4-implement.md) should instruct the implement
      agent to READ the design's per-AC test-mapping and, for any AC the plan marked
      exempt:not_applicable / infra_blocked, emit the corresponding ac_tdd entry with the well-formed
      exempt string (the regex /^(not_applicable|infra_blocked)\(.+\)$/ — the "(<why>)" parenthetical
      is mandatory). The agent must not have to re-derive an exemption two phases already justified.

  - title: "Hand the retro the actual tdd_violations, not just warn_mode_violations"
    detail: >
      In dark-factory.workflow.js the retro-dispatch prompt should include the halt object's
      tdd_violations array (the concrete reasons the gate fired) whenever terminal_status is
      HALT_TDD_GATE. Today retro only receives warn_mode_violations, which is empty by construction in
      halt mode and actively misleads ("must be empty for a trustworthy run" -> it IS empty -> looks
      fine, while the run actually halted). Without the violations list the retro cannot tell a
      genuine missing-RED from a malformed-exempt-string from an omitted-AC.

  - title: "Retry the implement self-report once on a pure-shape TDD violation before halting"
    detail: >
      When tddViolations() returns ONLY shape errors (malformed exempt string, or an AC done-without-
      ledger whose design marked it not_applicable) and there is NO missing-RED-for-real-logic, bounce
      back to the implement agent once with the specific violations and "re-emit ac_tdd; do not change
      code" — same bounded-retry principle as the fix loop. A no-unit-surface ledger is trivially
      regenerable; a one-shot retry likely converts this halt into a normal advance. Keep the hard
      halt for genuine missing RED on logic ACs.

  - title: "Capture the in-scope cheap proof before a late halt drops it (AC-3 baseline)"
    detail: >
      AC-3's only in-scope deliverable this pass was the Q3-accepted pre-upload baseline screenshot
      (US NY + CA ON). The TDD halt fired at Implement and pre-empted QA, so that proof was never
      taken. Consider letting a TDD shape-only halt still run the cheap visual_pending baseline
      capture (or attach a note that the baseline is owed) so a late-stage halt does not silently
      forfeit evidence that was already approved and one ui-probe call away.

  - title: "Finish KTP-784's frontend pass from the existing pushed branch — do not rebuild"
    detail: >
      The code is done and correct on KTP-784-state-centers-promoteid (85730fc, pushed). Re-dispatch
      should RESUME, not restart: regenerate the ac_tdd ledger (both ACs exempt:not_applicable with
      the parenthetical why), let it clear the gate, then run Review -> QA (capture the Q3 pre-upload
      AC-3 baseline, mark visual_pending, do NOT HALT_PRESHIP) -> ShipPrep (version bump + CHANGELOG;
      frontend CI pushes no git tag) -> MR. Then queue the AC-2 scripting pass. Also post the AC-0
      confirmation comment via /post-comment to close the spec-gate audit gap.

