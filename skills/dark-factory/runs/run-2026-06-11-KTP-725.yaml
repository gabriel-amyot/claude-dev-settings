      disk-only observation isn't enough.
  # ---- factory_fitness (start 100 -> 88) ----
  - points: 5
    reason: >
      factory_fitness: TDD-ledger location drift. The design plan explicitly instructed the RED proofs
      to be captured into <ticket_folder>/tdd/AC-1.md..AC-3.md as the TDD ledger. The tdd/ directory
