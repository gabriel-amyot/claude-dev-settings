improvements:
  - title: "Wire a fixture-mode ui-probe screenshot pass into the frontend QA socket (top priority)"
    detail: >
      The design purpose-built ?mediaPlanFixture=<variant> + a dev mock-SSE agent so every visual AC maps
      to a deterministic, backend-free screenshot. The QA socket never invoked it, so a frontend ticket
      reached HALT_PRESHIP with zero rendered-UI proof. For any belt=frontend run, QA should detect a
      declared fixture/mock capability in the spec and drive ui-probe against each variant, saving a
      screenshot per visual AC into qa/ (or design/screenshots/). Absence of a visual capture on a
      frontend ticket should itself downgrade QA to PARTIAL with an explicit "no visual proof" reason,
      not a silent PARTIAL.
  - title: "Review phase must persist a findings artifact, especially when confidence is sub-threshold"
    detail: >
      review/ was empty while the trace recorded confidence 64 / criticals:0. A review pass must always
      write review/findings.md (even 'no criticals; concerns: X, Y'), and when soft confidence is below a
      threshold (e.g. <70) it must record a 'why I'm only N% confident' note. Contract 9 should not have
      to reconstruct a review outcome from a bare trace number."
  - title: "Enforce phase-folder placement: TDD RED/GREEN captures go in tdd/, not qa/"
    detail: >
      The honest RED captures (red-AC-*.out) landed in qa/ while tdd/ sat empty. The TDD gate should write
      its RED and GREEN evidence into tdd/ (and cite them from the ledger); qa/ is for the QA socket's
      build/lint/unit/visual outputs. Consistent placement makes the RED->GREEN trail auditable and keeps
      the folder contract meaningful."
  - title: "QA must baseline pre-existing type/test failures against origin/dev and report only NEW ones"
    detail: >
      lint:types returned 9 errors, all pre-existing and unrelated to media-plan, but nothing classified
      them. The frontend QA socket should run tsc/lint on origin/dev first (or diff against a cached
      baseline) and surface only errors the branch introduced, tagging pre-existing ones as such. This
      turns an ambiguous red gate into an actionable one and honors the 'fix or attribute pre-existing
      failures' discipline."
  - title: "Tag TDD signal scope (logic vs visual) in telemetry so a clean gate is not over-read"
    detail: >
      The TDD gate was honestly GREEN for the pure-logic ACs but proves nothing about the rendered UI.
      Telemetry (and the runs INDEX) should annotate the TDD signal with its coverage scope
      ('logic-only', 'includes-visual') so a halt-mode/zero-violation gate on a frontend ticket is not
      mistaken for end-to-end proof of the feature."

