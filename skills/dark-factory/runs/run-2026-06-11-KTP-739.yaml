improvements:
  - title: "Carry a skip reason and partial context through every HALT_AGENT_SKIPPED return"
    detail: >
      workflow.js null-guards return only { status, phase, ticket } (line 407 et al.). Extend them to
      include why the agent returned null (operator pressed skip vs dispatch failure vs empty/invalid
      output), a timestamp, and whatever partial trace exists. Contract 9 currently receives an empty
      JSON trace on first-phase halts and cannot do evidence-based scoring.
  - title: "Resolve the ticket folder at workflow start, before the first agent call"
    detail: >
      The folder is deterministic from the CLAUDE.md schema (tickets/{PREFIX}/{EPIC-or-no-epic}/{ID})
      and KTP-739's already existed at tickets/KTP/KTP-736/KTP-739. Resolve it in the workflow
      preamble and thread it into every return object so even a Concierge-phase halt reports a usable
      folder instead of '(unresolved)'.
  - title: "Pre-dispatch triage gate that consumes existing spec-gate verdicts (recurring, now 3rd retro)"
    detail: >
      Before equipping the line, glob the ticket folder for reports/reviews/*spec-gate*.md (and the
      sprint mirror). If a verdict below ~75 or 'do not start' language exists with the blocking
      question still unposted/unanswered, refuse dispatch and route to a question-posting step
      instead. KTP-739 had exactly this artifact one day old. Same shape as the KTP-699 and KTP-762
      retro recommendations — promote from retro suggestion to an actual workflow.js front gate.
  - title: "Auto-route drafted spec-gate questions through /post-comment"
    detail: >
      Leo's gate ended with a ready-to-send recommendation-led question to Sisi (placement default =
      Dashboard, generator-returns-null hide contract, one aggregated blurb) marked 'Draft only —
      nothing posted.' Per the deferred-AC SOP, a drafted PO question must produce a Jira comment.
      Wire the spec-gate skill (or the triage gate above) to hand the draft to /post-comment for
      approval instead of leaving it disk-only.
  - title: "Retry once on a null first-agent return before halting"
    detail: >
      A null Concierge result is far more likely a dispatch glitch or accidental skip than a
      considered decision, and it costs an entire run. One automatic re-dispatch of the same agent
      (with the skip flagged) before emitting HALT_AGENT_SKIPPED would have salvaged this run or at
      least produced a diagnosable second failure.

