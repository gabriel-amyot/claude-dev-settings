improvements:
  - title: "Review phase must persist a findings artifact even at zero criticals"
    detail: >
      Contract 5 (review) should require writing review/findings.yaml — counts by severity, each
      finding with file:line and disposition (fixed/accepted), and an explicit 'criticals: 0' record
      with what was inspected — alongside diff.patch. The workflow gate should refuse a review PASS
      whose findings file is absent, exactly as QA refuses a PASS without test_ref.
  - title: "Grill corrections must write back to the artifacts they invalidate"
    detail: >
      When grill re-verification contradicts an analyst/ or design/ fact (here: GAP-6 vs
      assumptions.json 'max DATE = 2026-06-02 VERIFIED'), the grill contract must amend the source
      artifact in place (status: SUPERSEDED, pointer to the grill section) — not only record the
      delta in its own report. Downstream phases and resumes read analyst/ as truth.
  - title: "Java belt: codify the Mockito-strict-vs-RED rule and endpoint-path derivation"
    detail: >
      Add two rules to the java tool-belt prompt: (1) RED-first tests that stub the post-change
      collaborator must scope @MockitoSettings(LENIENT) to the nested test class, or strict mode's
      UnnecessaryStubbingException masks the watched-fail (bit KTP-678 at design, bit KTP-430
      before); (2) live-proof URLs must be derived as server.servlet.context-path + class-level
      @RequestMapping + method mapping, never from the method annotation alone (KTP-678 GAP-1).
  - title: "QA contract: live execution proof (or explicit waiver) for backend wiring tickets"
    detail: >
      For belts with a runnable artifact, contract 6 should require one execution-level proof —
      boot the service locally (java -jar --spring.profiles.active=local) and curl the real
      endpoint path with a date range that matches known data — or record an explicit
      execution_waiver with reason. KTP-678 shipped on unit/MockMvc + raw BQ only; the corrected
      GAP-1 path was never actually exercised end-to-end.
  - title: "Fix session resolution so retro handoffs land in a named session folder"
    detail: >
      sessions/active/state.yaml session_id has been empty across multiple 2026-06-11 runs
      (KTP-704, KTP-678), so every dark-factory handoff piles into the shared
      sessions/active/prompts/ root. Either the session:init hook must populate session_id, or the
      retro contract should fall back to the newest sessions/active/<slug>/ with a state file.
      Also normalize the per-phase status vocabulary to an enum (PASS/FAIL/SKIPPED + detail field)
      while touching the schema.
  - title: "Raise the BQ future-dated-rows finding as a data follow-up, not just a grill footnote"
    detail: >
      GAP-6's facts (max DATE 2026-06-30 on 2026-06-11; 86 fractional-CONVERSIONS rows) belong in a
      data-quality ticket or at minimum a general/inboxes/ item for the Dataform pipeline owner.
      The factory should treat 'upstream data contradicts documented assumptions' as an escalation
      output of the grill contract, since it lands on this ticket's endpoint after ship.

