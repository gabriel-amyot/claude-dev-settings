improvements:
  - title: "Design (contract 2/3): type DTO fields against the actual data-contract shapes, not the happy-path assumption"
    detail: "Grill caught avgDailyImpressions (string \"857.0\") typed as Long and a 16+ hex regex that misses the documented 15-char hash. The design phase should cross-reference each DTO field against the data-contract's stated type/example column before emitting the plan, and route every numeric-from-string field through the normalizer by default. Add a design self-check: 'for each field, what is its upstream type and a real example value, and does the chosen Java type parse it without throwing?'"
  - title: "Add a secret-hygiene gate that fires when a credential is committed to *.properties"
    detail: "Both review and QA flagged the live plaintext goldfish.api.key in application-dev.properties, same as the pre-existing placer.api.key. The factory should grep added/changed *.properties for credential-shaped values (api.key, uid, token, secret) during ship-prep and either (a) block with an explanation, or (b) auto-file a tracked Secret-Manager follow-up into the MR/Jira as a checklist item. Stop re-discovering this smell every Java proxy run."
  - title: "Add a live-upstream smoke step for external-API proxy tickets (or record verify_status)"
    detail: "For tickets whose deliverable is a proxy to a live external API, mocked tests prove wiring but not the live contract. Either add an optional ship-prep smoke (one curl against the real upstream behind the same headers, recorded in the trace) OR, at minimum, implement the verify_status: code_proven | live_proven per-AC modifier proposed in the KTP-779 retro so an in-code-only proof of a live proxy does not read as fully live-green."
  - title: "QA schema: first-class verify_status + operational_followups (carry-over from KTP-779)"
    detail: "Still unimplemented. Contract 6 should distinguish 'AC proven in code' from 'AC verifiable live', and surface a run-level operational_followups / pre_existing_caveats list so ALL_PASS cannot silently absorb a load-bearing caveat (plaintext key here; mbtiles upload last run) in free-text notes."
  - title: "Review: let a demonstrated-but-out-of-contract edge case escalate to a tracked follow-up, not just a notes line"
    detail: "The 200-with-error-envelope -> silent-empty-list and 404-conflation findings are real behavioral gaps correctly judged 'outside literal AC-5'. Rather than dying in the findings JSON, review should be able to emit a 'recommended follow-up ticket' signal that ship-prep folds into the MR/Jira, so genuinely useful hardening is not lost just because it was out of scope for this ticket."

