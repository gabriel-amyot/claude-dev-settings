improvements:
  - title: "Run the adversarial status/ordering pass INSIDE the review/fix loop, not after"
    detail: >
      The AC-B3 NO_DATA stale-OK ordering bug was a textbook adversarial finding (a valid in-scope AC, a
      realistic edge: latest partition is NO_DATA but an older OK row exists) yet it was found post-run.
      Contract 5/6 should run an explicit per-AC edge pass — for status/enum filters specifically: "what if
      the latest row carries the excluded status but an earlier row passes the filter?" — before the fix
      loop is allowed to close. A HIGH on an in-scope AC must RE-OPEN the loop, not ship and get patched
      out-of-band.
  - title: "Belt-level cache-config preflight for the cached-BQ adapter pattern"
    detail: >
      Every new @Cacheable service on this pattern (CountyPerformance, now CampaignInsight) risks a
      boot-time 500 from a cache name not registered in the Spring cache manager (campaignInsightsCache vs
      campaignInsightCache, etc.). Add a java-belt check: after wiring a new @Cacheable, assert the cache
      name is present in the cache-manager config (grep MapCacheConfig / cache definitions) BEFORE
      execution-verify, so the boot 500 is caught at build time, not at runtime.
  - title: "Make deliberate sub-scope a first-class workflow input + terminal state"
    detail: >
      This was an intentional backend-only slice of a full-stack ticket, but the trace expresses it as a
      generic HALT_PRESHIP/QA PARTIAL while the run note says READY_TO_SHIP. Add a run_scope field (e.g.
      'backend-half', with the explicit deferred-AC list) captured at concierge and threaded to Retro, plus
      a terminal state like SHIPPED_PARTIAL_SCOPE distinct from a blocked/incomplete PARTIAL. Then
      task_confidence can be scored against the run's declared scope, and the retro stops conflating
      'half by design' with 'half because something broke'.
  - title: "Emit a structured provenance flag when the run ticket != the work's true ticket"
    detail: >
      The concierge folded a phantom-KTP-779 backend into KTP-739 (correct operator call), but the factory
      shipped backend code under a ticket whose Jira ACs are frontend-only, with the backend ACs existing
      only in an in-flight Leo revision on disk. Add a concierge-phase check: if the equipped work maps to
      ACs not yet on the run ticket's Jira issue (or references a Done/phantom sibling), surface a provenance
      flag into the trace and the ship-prep MR/Jira note so the AC-to-code mapping is auditable at merge time.
  - title: "Classify infra_blocked execute-verify as an explicit field, and gate the live-read claim before the FE run"
    detail: >
      Carry an execute_verified field (e.g. infra_blocked(403 dataViewer on klever_proximity_insights)) into
      the terminal payload and the runs INDEX so a reader can tell a live-verified ship from an
      integration-test-only ship without opening the impl plan. Critically: before dispatching the frontend
      run, confirm the dataViewer grant (DAC !3) landed and a live curl returns the Blinds To Go CAD row —
      otherwise the FE panel hides on empty (AC-F3) and a still-403'd backend will render NOTHING while
      looking 'correct', masking a broken backend as a passing UI.
  - title: "Fix empty session_id and add a stale-checkout pre-flush"
    detail: >
      Two recurring frictions. (1) sessions/active/state.yaml session_id has been empty on both the
      2026-06-11 and 2026-06-22 KTP-739 runs; the live id is in latest-answer.md
      (976e79ba-de12-45da-8d9b-83c7db7010d1). Repair the session-init/state-write step or have Retro derive
      the session from latest-answer.md so handoffs land in the right per-session folder and are discoverable
      by /session:pickup. (2) Grill found the local checkout 2 commits behind origin/dev every run; add a
      workflow preamble that fetches, reports the behind-count, and auto-creates/uses the origin/dev worktree
      so the build phase never starts stale and the manual-sync instruction drops out of the plan.

