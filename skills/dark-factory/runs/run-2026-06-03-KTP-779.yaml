improvements:
  - title: "Concierge: weigh in-pipeline verifiability when options are equivalent-correctness"
    detail: "When the decision_packet offers multiple correct fixes (e.g. FE fallback vs tileset regeneration), the concierge gate should factor whether each option can be VERIFIED end-to-end within the factory (deploy + ui-probe). Prefer the option the factory can prove, or sequence the verifiable one first. Surface 'verifiability' as an explicit criterion in the concierge proposal so the human gate sees it. This run shipped the structurally-cleaner fix that the factory cannot confirm live."
  - title: "QA schema: add a first-class DEPLOYMENT_GATED / OPERATIONAL_FOLLOWUP verdict modifier"
    detail: "Contract 6 (QA) should distinguish 'AC proven in code' from 'AC verifiable live'. Add an optional per-AC field like verify_status: code_proven | live_proven and a run-level operational_followups list. Then ALL_PASS cannot silently absorb a load-bearing caveat in free-text notes; the gate and the retro both see the verification gap structurally."
  - title: "Ship-prep: emit enforced operational follow-ups, not just tasks"
    detail: "When QA records an operational_followup (e.g. 'regenerate + re-upload mbtiles to Mapbox'), ship-prep should write it into the MR description and the Jira comment as a blocking checklist item, and flag the ticket so it is not marked Done until the upload is confirmed. Avoids the silent-broken-in-prod risk."
  - title: "QA phase: transparent retry on transient infra failures"
    detail: "Wrap the QA execution step with a bounded retry (e.g. 2 attempts) on network/socket errors, logging each attempt. A transient socket drop should never produce a partial QA result; the retry should be automatic and recorded in the trace rather than relying on a manual cache re-run."
  - title: "QA: distinguish environmental pre-existing failures explicitly in result.yaml"
    detail: "test_geoid_regression.py failed for missing gitignored artifacts. QA correctly noted it, but the schema should carry a pre_existing_failures list (test, reason, related?) so retro and reviewers can tell 'our change is green' from 'the suite is green' at a glance."

