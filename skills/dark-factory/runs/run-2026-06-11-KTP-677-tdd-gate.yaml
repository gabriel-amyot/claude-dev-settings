improvements:
  - title: "Give the TDD gate a deletion / dead-code-removal mode"
    detail: >
      The gate must recognise when a ticket (or an AC) is pure removal — no new behavior to assert RED.
      Signal it from the design/grill output (the impl plan already writes 'RED-first does NOT apply')
      or detect it (an AC whose commits are net-deletions with no new test asserting new behavior). In
      that mode the gate's proof contract becomes: (a) compile clean, (b) full suite STAYS green
      (capture the before/after `mvn test` result), (c) target symbols are absent (grep), (d) any
      PRESERVED behavior keeps a guarding test (here AC-3's null-filter, which DID get a RED->GREEN
      pair). Pass on that evidence instead of halting for a missing RED unit that cannot exist. This is
      the single highest-leverage fix — without it the factory halts every cleanup ticket.
  - title: "Disambiguate same-day re-run telemetry filenames"
    detail: >
      run-<DATE>-<TICKET>.yaml collides whenever a ticket is re-dispatched the same day (exactly what
      happened: 07:23 no-op then this 17:xx full run). Append a run-sequence or terminal-status suffix
      (e.g. run-<DATE>-<TICKET>-2 or -<terminalstatus>). Update INDEX.md to carry both rows so the
      auto-improvement loop sees the no-op AND its successful re-dispatch as distinct events.
  - title: "Persist execute-verify evidence to the ticket reports/ when a phase claims GREEN"
    detail: >
      Implement asserted AC-5 suite GREEN and AC-1/AC-2 clean Spring start, but captured no log. The
      build phase should write `mvn test` summary + `spring-boot:run` startup line to
      tickets/{ID}/reports/implementation/ (or the worktree) so retro, review, and humans verify
      claims against artifacts, not commit prose. For bean-graph surgery this is the proof that no
      dangling reference / unsatisfied bean slipped through.
  - title: "Write jira/ac.yaml as the per-AC recovery save-point during/after implement"
    detail: >
      Project CLAUDE.md requires ac.yaml updated after each AC — it is the resume anchor. This run left
      it unwritten, so a cold start re-derives AC status from the diff. The implement phase (or a
      post-implement step) should write ac.yaml mapping each AC to its commit(s) and status.
  - title: "Clear KTP-677 through review + QA and merge BEFORE KTP-678"
    detail: >
      The branch is done and pushed; only the un-skippable TDD gate (correctly, per the deletion-mode
      gap above) stopped the auto-advance. Next action: either re-run with the deletion-mode gate, or
      manually run the remaining stations (adversarial review on the 2002-line deletion to confirm no
      over-deletion, then `mvn test` GREEN + Spring clean-start as QA), attach AC-0 BQ evidence to
      Jira, then MR to dev. Land it before KTP-678 (both touch ProximityTableConfig; 678 is already in
      flight with worktrees) to avoid the spec-gate-flagged collision.
  - title: "Emit a stub marker in tdd/ and review/ when the gate halts before populating them"
    detail: >
      The folders exist but are empty, which is ambiguous. On a pre-phase halt, drop a one-line marker
      (e.g. HALTED-BEFORE-THIS-PHASE.md with the terminal status) so 'not reached' is distinguishable
      from 'reached and produced nothing'.

