improvements:
  - title: "Enforce the Review findings artifact as a gate, not a recommendation"
    detail: >
      Two consecutive KTP-784 runs reported criticals:0 with an EMPTY review/ folder, and the preship
      retro's improvement #3 (write a findings file) did not stick. Promote it from a prose
      recommendation to a workflow.js gate: contract 5 (review) may not return PASS unless a findings
      file exists on disk at <ticket>/review/ (scope reviewed, criticals/majors/minors counts, one-line
      rationale). Same enforcement pattern as 'QA may not PASS without a test_ref'. A recommendation
      that survives one retro unactioned needs to become code.
  - title: "Make the ledger-repair retry write a one-line repair record (now overdue)"
    detail: >
      The bounded ledger-repair retry has now fired across two runs and still leaves no measurable
      footprint. Have the retry append a record to the run telemetry (and/or <ticket>/tdd/repair.log):
      violations seen, AC entries re-emitted, gate result after. Without it the improvement that
      converted KTP-784 from HALT_TDD_GATE to a clean advance cannot be proven to be paying off, and a
      regression in the retry would be invisible.
  - title: "Give the factory a local-stack-aware AC-3 capture leg before falling back to NEEDS_VISUAL_VERIFY"
    detail: >
      NEEDS_VISUAL_VERIFY is the correct honest terminal, but the factory never even ATTEMPTS the AC-3
      visual. Add a QA leg that, when a local stack is detectable (or can be started), drives ui-probe
      against the running app to capture the approved baseline (US NY + CA ON state-tier), and only
      falls back to NEEDS_VISUAL_VERIFY when no stack is available or auth fails. This would close the
      one remaining in-scope deliverable for visual-AC tickets without a human round-trip in the common
      case.
  - title: "Stamp QA's PARTIAL verdict with a one-line cause string in the trace"
    detail: >
      Still not applied (preship improvement #5). QA's verdict object should carry a cause field, e.g.
      'partial: AC-1 clean vs dev baseline (9 pre-existing TS errors, 0 new); AC-3 visual deferred to
      human local-stack capture'. So the retro and the human read the WHY from the verdict, not from
      reconstructing four .out files + the baseline diff.
  - title: "Surface the still-owed AC-0 spec-gate Jira comment as a blocking close-out item"
    detail: >
      Across four runs the AC-0 spec-gate confirmation comment has never been posted. The factory should
      carry forward such owed-external-comment items as an explicit close-out checklist entry on the
      terminal handoff (and ideally into GABRIEL_INBOX), so it is impossible to reach 'ticket closed'
      with the public audit trail still missing. (Note: external posts go through /post-comment.)
  - title: "Finish KTP-784's frontend pass from the pushed branch — RESUME, do not rebuild"
    detail: >
      The code is done, reviewed, QA-clean, version-bumped (1.1.65), changelogged, and pushed on
      KTP-784-state-centers-promoteid (85730fc + 6de44cf). To reach shippable: (1) verify 1.1.65 still
      leads dev's tip (tag-collision guard) — re-bump if dev moved; (2) start /klever-local-stack and
      capture the AC-3 pre-upload baseline (US NY + CA ON), mark visual_pending; (3) /klever-mr +
      /post-comment, honestly scoped (AC-1 shipped, AC-3 baseline + post-upload visual pending, AC-2 =
      next scripting pass); (4) post the still-owed AC-0 spec-gate confirmation comment; (5) queue the
      AC-2 scripting-belt pass (regen .mbtiles + script diff; Gabriel does the manual Mapbox upload).
      Do NOT restart the factory.

