improvements:
  - title: "Add a pre-dispatch triage filter for decision-gated tickets"
    detail: >
      Before a ticket enters the dark-factory line, check whether it has an unresolved 'Open
      Questions' section in Jira where the questions gate EVERY AC (as KTP-762's Q1/Q2/Q3 do, and as
      KTP-699 did). If so, route it to a human-decision queue / GABRIEL_INBOX rather than spending a
      concierge cycle. The analyst's own deliverable_classification field already flags
      "NOT a self-contained code change" — wire that classification into a gate that short-circuits
      dispatch. This is the same shape as the two KTP-699 BLOCKED_SPEC_QUALITY runs; promote it from
      a per-run red flag to a tracked routing improvement.
  - title: "On BLOCKED_SPEC_QUALITY, auto-emit a Jira comment tagging the decision owners"
    detail: >
      When the concierge halts because open questions gate the ACs, the factory should (per the
      CLAUDE.md 'A Deferred AC Is an Open Question' SOP) auto-draft a Jira comment on the ticket via
      /post-comment listing the blocking questions (here Q1 access path, Q2 governance, Q3
      advertiser mapping) and tagging the PO/tech-lead, plus add an 'Open Questions / Deferred ACs'
      line. Right now the questions live only in analyst/ac-list.json and assumptions.json on disk —
      the humans who own Q1/Q2/Q3 never see them. Disk-only parking is the named failure mode.
  - title: "Separate the access-path decision (Q1) into an explicit two-option proposal artifact"
    detail: >
      KTP-762's real blocker is a binary infra choice: (a) cross-project IAM read of the populated
      PROD table + a proximity-report dev-profile config change, vs (b) a DEV backfill job (likely
      Dataform/data-pipeline, NOT proximity-report). The factory has already verified both sides of
      the gap (PROD populated, DEV empty, config points at DEV). It should write a short decision
      memo to the ticket reports/ enumerating both paths with their owners, cost, and governance
      implication, so the human decision is one click rather than a re-investigation. Turns a halt
      into a teed-up decision.
  - title: "Carry the live-verified facts forward so a re-run does not re-query BQ"
    detail: >
      The concierge live-verified row counts, freshness, schema, and the dev/prod config split (all
      in assumptions.json with bq/grep sources and a 2026-06-09 date). When Q1/Q2/Q3 resolve and the
      ticket re-enters the line, the re-run should consume those verified_facts as a cache (with a
      freshness check on the date) instead of repeating the BQ queries. Small efficiency win for the
      inevitable re-dispatch.

