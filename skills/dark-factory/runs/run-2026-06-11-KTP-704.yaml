improvements:
  - title: "Batch-level circuit breaker on repeated identical agent skips"
    detail: >
      When the factory is dispatched as a sprint batch (Sprint Factory or parallel single-ticket
      runs), the FIRST HALT_AGENT_SKIPPED should pause the remaining dispatches and surface the
      skip to the human. On 2026-06-11 four+ Sprint-6 runs (KTP-677, KTP-695, KTP-704, KTP-784)
      all died at the same Concierge null-guard — a systemic dispatch failure that a one-skip
      tripwire would have caught after the first ticket instead of burning the whole wave. Mirrors
      the existing CLAUDE.md pipeline-retry circuit-breaker principle.
  - title: "Capture and return the skip cause in every HALT_AGENT_SKIPPED null-guard"
    detail: >
      In dark-factory.workflow.js, every `if (!x) return { status: 'HALT_AGENT_SKIPPED', ... }`
      guard (lines 407, 446, 452, 471, 490, 510, 522, 540, 554) should also capture whatever the
      Workflow tool exposes about the agent() call outcome (declined / errored / timed out / empty
      return) and include it as `skip_reason` in the terminal object, plus rec() a phase entry with
      status 'SKIPPED' so the trace is never empty. Retro and resume logic are blind without it.
  - title: "Resolve ticket_folder deterministically in workflow code before the concierge dispatch"
    detail: >
      Compute a fallback ticket folder from the schema convention (tickets/{PREFIX}/{EPIC|no-epic}/
      {TICKET}/, epic from a cheap Jira lookup or an existing on-disk match) at workflow start, and
      carry it in every terminal object. The concierge can refine it, but a front-gate skip should
      never leave the retro phase with 'ticket folder: (unresolved)' when the folder exists on disk.
  - title: "One bounded auto-retry when the Concierge agent is skipped with zero work done"
    detail: >
      A null agent return at phase 1 is the cheapest possible retry: no state, no side effects, no
      worktree. The workflow should retry the concierge dispatch exactly once (with the skip cause
      appended to the prompt) before emitting HALT_AGENT_SKIPPED. Later-phase skips (post-implement)
      should still halt immediately since a branch already exists.
  - title: "Feed existing spec-gate artifacts into the concierge prompt and gate on their required actions"
    detail: >
      When reports/reviews/*spec-gate*.md exists in the ticket folder (as sprint6-spec-gate-
      2026-06-10.md did here, score 88 with a ready-to-post PO reply), the workflow should pass its
      path into the concierge prompt and the concierge should verify the gate's 'Required before
      sprint start' actions are done (SP set + PO replied, AC-6 default confirmed) — surfacing them
      as open_questions if not — instead of re-deriving spec quality from scratch. On re-run for
      KTP-704 specifically: post the drafted Jira reply (2 SP + AC-6 default = stop and revert to
      range aggregate, same as AC-4) via /post-comment first.

summary: >
  KTP-704 (DIT React #185 render-loop bug) never started: the very first agent dispatch (Concierge)
  returned null and the workflow halted HALT_AGENT_SKIPPED with an empty trace, no skip reason, and
  an unresolved ticket folder — task_confidence 5 / factory_fitness 58. The failure is fleet-wide:
  KTP-677, KTP-695, and KTP-784 died the same way on the same date, so the agent-dispatch mechanism
  failed across the whole Sprint-6 wave with no circuit breaker. The ticket itself is in excellent
  shape (night-before Leo spec gate: 88/100, root cause pre-diagnosed, remaining scope is Bug 2 only
  in app-front-portal), so the loss is pure factory infrastructure: null-guards that record no
  cause, a trace that only logs successes, no deterministic ticket-folder fallback, no batch
  tripwire. Re-run is cheap and should succeed once dispatch works and the two pre-start actions
  from the spec gate (SP reply to the PO, AC-6 default) are posted.
